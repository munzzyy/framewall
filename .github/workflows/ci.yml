name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tesseract (Linux only; macOS/Windows run the heuristic subset)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - name: Install framewall and test deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Smoke-test the CLI end to end
        run: |
          framewall scan examples/clean-screenshot.png --fail-on dangerous
          framewall scan examples/poisoned-screenshot.png --json --fail-on none

  noslop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install noslop-lint==0.10.0
      - name: Lint source for AI-slop tells
        run: git ls-files -z '*.py' | xargs -0r noslop --no-config
      - name: Lint docs for AI-slop tells
        run: git ls-files -z '*.md' | xargs -0r noslop --no-config --prose
